name: Release Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-dev:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            patchelf \
            librsvg2-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure updater channel
        shell: bash
        run: echo "VITE_FORGE_RELEASE_CHANNEL=dev" >> "$GITHUB_ENV"

      - name: Run verification
        run: |
          if [ "${{ matrix.platform }}" != "windows-latest" ]; then pnpm test:run; fi
          pnpm build
          cargo build --manifest-path src-tauri/Cargo.toml

      - name: Publish dev release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: dev-${{ github.run_number }}
          releaseName: Forge Dev ${{ github.run_number }}
          releaseBody: |
            Automated development release from `${{ github.sha }}`.
            Use the assets below to install the latest development build.
          releaseDraft: false
          prerelease: true
          includeDebug: false
          includeRelease: true
          args: ${{ matrix.args }}

      - name: Generate updater metadata aliases
        if: always()
        shell: bash
        run: |
          shopt -s globstar nullglob
          LATEST_JSON=""
          for candidate in src-tauri/target/release/bundle/**/latest.json; do
            LATEST_JSON="$candidate"
            break
          done
          if [ -z "$LATEST_JSON" ]; then
            echo "No latest.json generated; skipping updater alias generation"
            exit 0
          fi
          node scripts/generate-updater-json.mjs "$LATEST_JSON" .updater/latest.json "Development release" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Upload dev updater alias
        if: always()
        shell: bash
        run: |
          if [ -f .updater/latest.json ]; then
            if ! gh release view latest-dev >/dev/null 2>&1; then
              gh release create latest-dev --prerelease --title "Forge Dev Latest" --notes "Stable alias for latest development updater metadata"
            fi
            gh release upload latest-dev .updater/latest.json --clobber
          fi
